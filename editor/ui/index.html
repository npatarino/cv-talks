<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Talks Slide Editor</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header id="topbar">
      <div id="topbar-left">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="9" stroke="#02B5B9" stroke-width="1.5"/>
          <path d="M7 10.5L9 12.5L13 8.5" stroke="#02B5B9" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span id="deck-title">Select a deck</span>
      </div>
      <div id="topbar-center">
        <select id="deck-selector">
          <option value="">Loading decks…</option>
        </select>
      </div>
      <div id="topbar-right">
        <label class="toggle-label" title="Write to disk on every change to update the preview live">
          <input type="checkbox" id="toggle-live-preview" checked>
          <span>Live preview</span>
        </label>
        <span id="save-status" class="status-idle">All saved</span>
        <button id="btn-present" class="btn-secondary" disabled title="Present from current slide">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M4.5 2.5v9l7-4.5-7-4.5z" fill="currentColor"/>
          </svg>
          <span>Present</span>
        </button>
        <button id="btn-export-pdf" class="btn-secondary" disabled title="Export all slides to PDF">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M7 2v7M4 6l3 3 3-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 10v1a1 1 0 0 0 1 1h8a1 1 0 0 0 1-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <span>PDF</span>
        </button>
        <button id="btn-save" class="btn-primary" disabled>Save Changes</button>
      </div>
    </header>

    <!-- Main layout -->
    <main id="main">
      <!-- Left: Slide list -->
      <aside id="sidebar">
        <div id="sidebar-header">
          <span class="sidebar-label">Slides</span>
          <button id="btn-add-slide" class="btn-icon" title="Add slide">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        <div id="slide-list" class="slide-list">
          <div class="empty-state">Select a deck above</div>
        </div>
      </aside>

      <!-- Center: Preview -->
      <section id="preview-panel">
        <div id="preview-toolbar">
          <span id="preview-label">No slide selected</span>
        <div id="preview-actions">
          <button id="btn-revert" class="btn-icon" title="Revert to git HEAD (discards all local changes)" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 5.5A5 5 0 1 1 3.5 9.5M2 2v4h4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="btn-move-up" class="btn-icon" title="Move up" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 11V3M3 7l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="btn-move-down" class="btn-icon" title="Move down" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 3v8M3 7l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <button id="btn-delete-slide" class="btn-icon btn-danger" title="Delete slide" disabled>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.7 7.5h6.6L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        </div>
        <div id="preview-container">
          <div id="preview-placeholder">
            <div class="placeholder-text">Select a slide to preview</div>
          </div>
          <!-- No sandbox: Eleventy live-reload needs WebSocket + navigation -->
          <div id="preview-scaler" style="display:none; position:relative; flex-shrink:0;">
            <iframe id="preview-frame" src="about:blank"
              style="position:absolute;top:0;left:0;width:1920px;height:1080px;border:none;transform-origin:top left;box-shadow:0 8px 32px rgba(0,0,0,0.4);border-radius:6px;">
            </iframe>
          </div>
        </div>
        <!-- Speaker notes panel -->
        <div id="notes-panel">
          <div id="notes-resize-handle"></div>
          <div id="notes-header">
            <span class="notes-label">Speaker Notes</span>
            <button id="btn-notes-toggle" class="btn-icon" title="Toggle speaker notes">
              <svg id="notes-toggle-icon" width="14" height="14" viewBox="0 0 14 14" fill="none">
                <path d="M3 5l4 4 4-4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div id="notes-body">
            <textarea id="notes-textarea" placeholder="Add speaker notes…" disabled></textarea>
          </div>
        </div>
      </section>

      <!-- Right: Form editor -->
      <aside id="form-panel">
        <div id="form-header">
          <span class="form-label">Properties</span>
        </div>
        <div id="form-body">
          <div class="empty-state">Select a slide to edit</div>
        </div>
      </aside>
    </main>
  </div>

  <!-- Add Slide Modal -->
  <div id="modal-add" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-gallery">
      <div class="modal-header">
        <h2>Add Slide</h2>
        <div class="modal-header-right">
          <input type="text" id="gallery-search" placeholder="Search templates…" autocomplete="off">
          <button class="btn-icon modal-close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M3 3l10 10M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Two-column layout: gallery left, config right -->
      <div class="modal-gallery-layout">
        <!-- Template gallery -->
        <div class="gallery-pane">
          <div id="gallery-grid">
            <div class="gallery-loading">Loading templates…</div>
          </div>
        </div>

        <!-- Config panel -->
        <div class="gallery-config">
          <div id="selected-preview-wrap">
            <div class="selected-preview-placeholder">Select a template</div>
          </div>

          <div class="config-fields">
            <label class="form-field">
              <span class="field-label">Recipe</span>
              <select id="new-recipe">
                <option value="canvas-quiet">canvas-quiet</option>
                <option value="canvas-signal">canvas-signal</option>
                <option value="paper">paper</option>
                <option value="energy-loud">energy-loud</option>
                <option value="cool-fresh">cool-fresh</option>
                <option value="critical">critical</option>
              </select>
            </label>
            <label class="form-field">
              <span class="field-label">Label</span>
              <input type="text" id="new-label" placeholder="Slide label…">
            </label>
            <label class="form-field">
              <span class="field-label">Insert at position</span>
              <input type="number" id="new-position" min="1" value="1">
            </label>
          </div>

          <!-- Hidden inputs for selected template/variant -->
          <input type="hidden" id="new-template" value="">
          <input type="hidden" id="new-variant" value="">
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-secondary modal-close">Cancel</button>
        <button class="btn-primary" id="btn-add-confirm" disabled>Add Slide</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="modal-confirm" class="modal" hidden>
    <div class="modal-backdrop"></div>
    <div class="modal-content modal-sm">
      <div class="modal-header">
        <h2>Delete Slide?</h2>
      </div>
      <div class="modal-body">
        <p id="confirm-message"></p>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="btn-confirm-cancel">Cancel</button>
        <button class="btn-danger" id="btn-confirm-ok">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
